name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish the package version from this ref to npm"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Verify release candidate
        run: npm run release:verify

      - name: Build release tarball
        run: npm pack --ignore-scripts

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-diff-${{ github.ref_name }}
          path: "*.tgz"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "::notice::${package_name}@${package_version} is already published; skipping npm publish."
            exit 0
          fi

          npm publish ./*.tgz --access public --ignore-scripts --provenance
