name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release candidate
        run: npm run release:verify

      - name: Build release tarball
        run: npm pack --ignore-scripts

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-diff-${{ github.ref_name }}
          path: "*.tgz"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true

      - name: Publish to npm if credentials allow it
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::notice::NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "::notice::${package_name}@${package_version} is already published; skipping npm publish."
            exit 0
          fi

          if ! npm publish ./*.tgz --access public --ignore-scripts; then
            echo "::warning::npm publish failed. Check NPM_TOKEN permissions for ${package_name}; GitHub release artifacts were still created."
          fi
