<text x="34" y="128" xml:space="preserve"><tspan fill="#d8dee9" font-weight="500">  </tspan><tspan fill="#d8dee9" font-weight="700">Better Diff — Git changes</tspan><tspan fill="#d8dee9" font-weight="500"> </tspan><tspan fill="#8f9bae" font-weight="500">3 files • 3 hunks •</tspan><tspan fill="#d8dee9" font-weight="500"> </tspan><tspan fill="#86efac" font-weight="500">+34</tspan><tspan fill="#d8dee9" font-weight="500"> </tspan><tspan fill="#fca5a5" font-weight="500">-8</tspan></text>
<text x="34" y="148" xml:space="preserve"><tspan fill="#8f9bae" font-weight="500">  staged (HEAD → index) above unstaged (index → working tree)</tspan></text>
<text x="34" y="168" xml:space="preserve"><tspan fill="#8f9bae" font-weight="500">  ↑/↓: move. ←/→ or ctrl+u/d: page. h/l: fold/branch/dive. tab: turn/files. [/]: hunk. [f/]f: file. /: search. ?: g</tspan><tspan fill="#d8dee9" font-weight="500">...</tspan></text>
