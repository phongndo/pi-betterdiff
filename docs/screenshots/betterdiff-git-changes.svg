<text x="34" y="428" xml:space="preserve"><tspan fill="#d8dee9" font-weight="500">  </tspan><tspan fill="#5f6b7c" font-weight="500">│     </tspan><tspan fill="#d8dee9" font-weight="500">  </tspan><tspan fill="#94a3b8" font-weight="500"> 18 </tspan><tspan fill="#d8dee9" font-weight="500">Then use `/diff` inside pi to open the BetterDiff review UI.</tspan></text>
<text x="34" y="448" xml:space="preserve"><tspan fill="#d8dee9" font-weight="500">  </tspan><tspan fill="#5f6b7c" font-weight="500">│     </tspan><tspan fill="#d8dee9" font-weight="500">  </tspan><tspan fill="#86efac" font-weight="500">+19 </tspan><tspan fill="#d8dee9" font-weight="500">The review opens on the active session head and keeps branch forks visible.</tspan></text>
